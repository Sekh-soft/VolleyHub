<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Live Score - VolleyHub</title>

<link rel="stylesheet" href="css/live-score.css">

</head>

<body>

<!-- MATCH SETTINGS -->
<div class="settings" id="settingsPanel">

<h2>Match Settings</h2>

<input id="teamAInput" placeholder="Team A Name">
<input id="teamBInput" placeholder="Team B Name">

<label>Points per Set</label>
<input id="pointsInput" type="number" value="25">

<label>Total Sets</label>
<input id="setsInput" type="number" value="3">

<button class="start-btn" onclick="startMatch()">Start Match</button>

</div>


<!-- SCOREBOARD -->
<div class="scoreboard">

<div class="teams">

<div class="team-block">
<h2 id="teamAName">Team A</h2>
<h1 id="scoreA">0</h1>
</div>

<div class="team-block">
<h2 id="teamBName">Team B</h2>
<h1 id="scoreB">0</h1>
</div>

</div>


<!-- MATCH INFO -->
<div class="match-info">

<div class="sets">
Sets :
<span id="setA">0</span> -
<span id="setB">0</span>
</div>

<div class="serve">
Serve :
<span id="serveIndicator">Team A</span>
</div>

</div>


<!-- TIMER -->
<div class="timer">

<span id="timerDisplay">00:00</span>

<div class="timer-buttons">
<button id="startStopButton">Start</button>
<button id="resetButton">Reset</button>
</div>

</div>


<!-- CONTROLS -->
<div class="match-controls">

<button onclick="addPointA()">+ Team A</button>
<button onclick="addPointB()">+ Team B</button>

<button onclick="undoPoint()">Undo</button>

<button onclick="toggleServe()">Toggle Serve</button>

<button onclick="resetMatch()">Reset Match</button>

<button onclick="openLive()">Live Screen</button>

</div>

</div>

<script src="js/main.js"></script>

</body>
</html>
