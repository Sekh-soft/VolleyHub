<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>VolleyHub Tournament</title>

<link rel="stylesheet" href="css/tournament.css">

</head>

<body>

<h1>VolleyHub Tournament Bracket</h1>

<div class="team-input">

<input id="team1" type="text" placeholder="Team 1">
<input id="team2" type="text" placeholder="Team 2">
<input id="team3" type="text" placeholder="Team 3">
<input id="team4" type="text" placeholder="Team 4">
<input id="team5" type="text" placeholder="Team 5">
<input id="team6" type="text" placeholder="Team 6">
<input id="team7" type="text" placeholder="Team 7">
<input id="team8" type="text" placeholder="Team 8">

<button onclick="generateBracket()">Generate Bracket</button>

</div>


<div class="bracket">

<div class="round">

<h2>Quarter Finals</h2>

<div id="q1" class="match"></div>
<div id="q2" class="match"></div>
<div id="q3" class="match"></div>
<div id="q4" class="match"></div>

</div>


<div class="round">

<h2>Semi Finals</h2>

<div id="s1" class="match">Winner Q1 vs Winner Q2</div>
<div id="s2" class="match">Winner Q3 vs Winner Q4</div>

</div>


<div class="round">

<h2>Final</h2>

<div id="final" class="match">Winner S1 vs Winner S2</div>

</div>

</div>


<script src="js/tournament.js" defer></script>

</body>
</html>
